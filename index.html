<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff & Salary Data</title>
    <!-- Bootstrap CSS Styling के लिए -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); overflow-x: auto; }
        .loading { font-size: 1.2rem; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h2 class="mb-4 text-center">Staff Details & Salary Report</h2>
    
    <div class="table-container">
        <div id="loader" class="loading">डेटा लोड हो रहा है, कृपया प्रतीक्षा करें...</div>
        <table class="table table-bordered table-striped d-none" id="dataTable">
            <thead class="table-dark" id="tableHeader">
                <!-- हेडर यहाँ आटोमेटिक जेनरेट होंगे -->
            </thead>
            <tbody id="tableBody">
                <!-- डेटा यहाँ आटोमेटिक जेनरेट होगा -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // यहाँ अपना स्टेप 1 से मिला Google Apps Script Web App URL डालें
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwJYnbYUK0iP_Qk11BJDdjLbtl9dAsO0zOoHKU6JJZdGM3a6ViaO8O2xGbJ3fBrnRmC/exec";

    async function fetchData() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            if (data.length === 0) {
                document.getElementById('loader').innerText = "कोई डेटा नहीं मिला।";
                return;
            }

            // टेबल हेडर्स बनाना
            const headers = Object.keys(data[0]);
            const headerRow = document.createElement('tr');
            headers.forEach(header => {
                const th = document.createElement('th');
                th.innerText = header;
                headerRow.appendChild(th);
            });
            document.getElementById('tableHeader').appendChild(headerRow);

            // टेबल रोज़ (Rows) बनाना
            const tableBody = document.getElementById('tableBody');
            data.forEach(row => {
                const tr = document.createElement('tr');
                headers.forEach(header => {
                    const td = document.createElement('td');
                    td.innerText = row[header] !== undefined ? row[header] : "";
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            // लोडर छुपाएं और टेबल दिखाएं
            document.getElementById('loader').classList.add('d-none');
            document.getElementById('dataTable').classList.remove('d-none');

        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById('loader').innerText = "डेटा लोड करने में त्रुटि हुई। कृपया URL और अनुमतियां जांचें।";
        }
    }

    // पेज लोड होने पर फंक्शन चलाएं
    window.onload = fetchData;
</script>

</body>
</html>
