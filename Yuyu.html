<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Salary Portal</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:30px; }
.container { max-width:900px; margin:auto; background:white; padding:25px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
input { width:100%; padding:12px; margin:10px 0; }
button { padding:12px 20px; background:#0066cc; color:white; border:none; cursor:pointer; margin:5px 0; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
table td, table th { border:1px solid #ccc; padding:8px; text-align:left; }
h3 { margin-top:30px; }
</style>
</head>
<body>

<div class="container">
  <h2>Employee Salary Portal</h2>
  
  <!-- Login -->
  <input type="text" id="memberCode" placeholder="Enter Member Code">
  <button onclick="searchData()">View Salary Detail</button>

  <br><br>
  <input type="password" id="adminPass" placeholder="Enter Admin Password to Refresh Data">
  <button onclick="clearLocalStorage()">Refresh Data</button>

  <div id="result"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyTW2NCtQBRyXUVnirE3nsUhZ7Sx4TqbcPqyArFYNhfN_OxULFrT-BS4iZCKngLCPQ/exec"; // Your deployed Apps Script Web App URL

// On page load: fetch all sheet data if not in localStorage
window.addEventListener('load', () => {
  if(!localStorage.getItem('allEmployees')) {
    fetchAllData();
  }
});

function fetchAllData() {
  document.getElementById('result').innerHTML = "<p>Loading data, please wait...</p>";
  fetch(`${API_URL}?all=true`) // You can modify Apps Script to return all rows when all=true
    .then(res => res.json())
    .then(data => {
      if(data) {
        localStorage.setItem('allEmployees', JSON.stringify(data));
        document.getElementById('result').innerHTML = "<p>Data loaded! Enter Member Code above.</p>";
      }
    })
    .catch(err => console.error(err));
}

// Show individual employee
function searchData() {
  const code = document.getElementById("memberCode").value.trim();
  if(!code) return alert("Enter Member Code");

  const allData = JSON.parse(localStorage.getItem('allEmployees') || '{}');
  const data = allData.find(emp => emp['Member Code'] === code);

  if(!data) {
    document.getElementById("result").innerHTML = "<h3>No Record Found</h3>";
    return;
  }

  const headers = Object.keys(data);
  const staffCols = headers.slice(0,10);
  const salaryCols = headers.slice(10,17);
  const deductionCols = headers.slice(17,20);
  const paymentCols = headers.slice(20,24);

  function buildTable(title, cols) {
    let html = `<h3>${title}</h3><table><tr>`;
    cols.forEach(key => html += `<th>${key}</th>`);
    html += `</tr><tr>`;
    cols.forEach(key => html += `<td>${data[key]}</td>`);
    html += `</tr></table>`;
    return html;
  }

  let html = "";
  html += buildTable("Staff Detail (A-J)", staffCols);
  html += buildTable("Salary Detail (K-Q)", salaryCols);
  html += buildTable("Deduction Detail (R-T)", deductionCols);
  html += buildTable("Payment Detail (U-X)", paymentCols);

  document.getElementById("result").innerHTML = html;
}

// Clear localStorage and fetch fresh data
function clearLocalStorage() {
  const pass = document.getElementById('adminPass').value;
  if(pass !== 'admin123') return alert("Wrong password!");
  localStorage.removeItem('allEmployees');
  fetchAllData();
}
</script>

</body>
</html>
